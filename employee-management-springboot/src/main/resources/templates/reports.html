<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - Employee Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0f3460; --secondary: #16213e; --accent: #00d4ff;
            --accent-dark: #0099ff; --success: #00ff88; --warning: #ffb347;
            --danger: #ff6b6b; --bg: #f0f2f5; --card-bg: #ffffff;
            --text: #1a1a2e; --text-muted: #6b7280; --border: #e5e7eb;
            --sidebar-width: 260px; --sidebar-collapsed: 70px;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        .sidebar {
            position: fixed; left: 0; top: 0; width: var(--sidebar-width); height: 100vh;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); z-index: 1000;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); overflow: hidden;
        }
        .sidebar.collapsed { width: var(--sidebar-collapsed); }
        .sidebar-header { padding: 24px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-logo { width: 42px; height: 42px; background: linear-gradient(135deg, var(--accent), var(--accent-dark)); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; flex-shrink: 0; animation: logoPulse 3s ease-in-out infinite; }
        @keyframes logoPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.4); } 50% { box-shadow: 0 0 0 10px rgba(0, 212, 255, 0); } }
        .sidebar-title { color: white; font-size: 18px; font-weight: 700; white-space: nowrap; opacity: 1; transition: opacity 0.3s; }
        .sidebar.collapsed .sidebar-title { opacity: 0; width: 0; }
        .sidebar-nav { padding: 16px 12px; }
        .nav-item { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border-radius: 12px; color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; font-weight: 500; transition: all 0.3s ease; margin-bottom: 4px; position: relative; overflow: hidden; }
        .nav-item::before { content: ''; position: absolute; left: 0; top: 0; width: 3px; height: 100%; background: var(--accent); border-radius: 0 4px 4px 0; transform: scaleY(0); transition: transform 0.3s ease; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.08); color: white; }
        .nav-item.active::before { transform: scaleY(1); }
        .nav-item i { font-size: 18px; width: 24px; text-align: center; flex-shrink: 0; }
        .nav-item span { white-space: nowrap; opacity: 1; transition: opacity 0.3s; }
        .sidebar.collapsed .nav-item span { opacity: 0; width: 0; }
        .sidebar-footer { position: absolute; bottom: 0; left: 0; right: 0; padding: 16px; border-top: 1px solid rgba(255,255,255,0.1); }
        .user-profile { display: flex; align-items: center; gap: 12px; padding: 8px; border-radius: 12px; transition: background 0.3s; text-decoration: none; }
        .user-profile:hover { background: rgba(255,255,255,0.08); }
        .user-avatar { width: 40px; height: 40px; background: linear-gradient(135deg, var(--accent), var(--accent-dark)); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 16px; flex-shrink: 0; }
        .user-info { flex: 1; min-width: 0; opacity: 1; transition: opacity 0.3s; }
        .sidebar.collapsed .user-info { opacity: 0; width: 0; }
        .user-name { color: white; font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-role { color: rgba(255,255,255,0.5); font-size: 12px; white-space: nowrap; }
        .sidebar-toggle { position: absolute; right: -12px; top: 80px; width: 24px; height: 24px; background: var(--accent); border: none; border-radius: 50%; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; box-shadow: 0 2px 8px rgba(0, 212, 255, 0.3); transition: all 0.3s ease; z-index: 1001; }
        .sidebar-toggle:hover { transform: scale(1.1); }
        .sidebar.collapsed .sidebar-toggle i { transform: rotate(180deg); }

        .main-content { margin-left: var(--sidebar-width); transition: margin-left 0.4s cubic-bezier(0.16, 1, 0.3, 1); min-height: 100vh; }
        .sidebar.collapsed + .main-content { margin-left: var(--sidebar-collapsed); }
        .top-header { background: white; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .page-title { font-size: 24px; font-weight: 700; color: var(--text); }
        .page-title span { color: var(--accent-dark); }
        .header-actions { display: flex; align-items: center; gap: 16px; }
        .btn { padding: 10px 20px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; border: none; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: white; box-shadow: 0 4px 15px rgba(0, 153, 255, 0.3); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0, 153, 255, 0.4); }
        .btn-secondary { background: white; color: var(--text); border: 2px solid var(--border); }
        .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
        .content-area { padding: 32px; }

        .reports-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; margin-bottom: 32px; }
        .report-card { background: white; border-radius: 16px; padding: 24px; border: 1px solid var(--border); animation: fadeInUp 0.6s ease forwards; opacity: 0; transform: translateY(20px); }
        .report-card:nth-child(1) { animation-delay: 0.1s; }
        .report-card:nth-child(2) { animation-delay: 0.2s; }
        .report-card:nth-child(3) { animation-delay: 0.3s; }
        .report-card:nth-child(4) { animation-delay: 0.4s; }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        .report-card:hover { box-shadow: 0 20px 40px rgba(0,0,0,0.08); border-color: var(--accent); }
        .report-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .report-title { font-size: 18px; font-weight: 700; }
        .chart-container { position: relative; height: 280px; }
        .report-card.full-width { grid-column: 1 / -1; }

        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px; }
        .mini-stat { background: white; border-radius: 12px; padding: 20px; border: 1px solid var(--border); text-align: center; animation: fadeInUp 0.5s ease forwards; opacity: 0; }
        .mini-stat:nth-child(1) { animation-delay: 0.05s; }
        .mini-stat:nth-child(2) { animation-delay: 0.1s; }
        .mini-stat:nth-child(3) { animation-delay: 0.15s; }
        .mini-stat:nth-child(4) { animation-delay: 0.2s; }
        .mini-stat-value { font-size: 24px; font-weight: 800; color: var(--accent-dark); margin-bottom: 4px; }
        .mini-stat-label { font-size: 13px; color: var(--text-muted); font-weight: 500; }

        .toast-container { position: fixed; top: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 12px; }
        .toast { background: white; border-radius: 12px; padding: 16px 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 12px; min-width: 300px; animation: toastSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1); border-left: 4px solid var(--accent); }
        @keyframes toastSlide { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast.success { border-left-color: var(--success); }
        .toast.error { border-left-color: var(--danger); }
        .toast-icon { font-size: 20px; }
        .toast.success .toast-icon { color: var(--success); }
        .toast.error .toast-icon { color: var(--danger); }
        .toast-content { flex: 1; }
        .toast-title { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
        .toast-message { font-size: 13px; color: var(--text-muted); }
        .toast-close { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; }
        .toast-close:hover { color: var(--text); }

        @media (max-width: 1200px) { .reports-grid { grid-template-columns: 1fr; } .stats-row { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) { .sidebar { transform: translateX(-100%); } .sidebar.open { transform: translateX(0); } .main-content { margin-left: 0; } .stats-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo"><i class="fas fa-users"></i></div>
            <span class="sidebar-title">EmpSystem</span>
        </div>
        <button class="sidebar-toggle" id="sidebarToggle"><i class="fas fa-chevron-left"></i></button>
        <nav class="sidebar-nav">
            <a href="/dashboard" class="nav-item"><i class="fas fa-chart-line"></i><span>Dashboard</span></a>
            <a href="/employees" class="nav-item"><i class="fas fa-user-tie"></i><span>Employees</span></a>
            <a href="/reports" class="nav-item active"><i class="fas fa-file-alt"></i><span>Reports</span></a>
            <a href="/profile" class="nav-item"><i class="fas fa-user-circle"></i><span>Profile</span></a>
        </nav>
        <div class="sidebar-footer">
            <a href="/logout" class="user-profile">
                <div class="user-avatar" id="userAvatar">A</div>
                <div class="user-info">
                    <div class="user-name" id="userName">Admin</div>
                    <div class="user-role">Administrator</div>
                </div>
            </a>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-header">
            <h1 class="page-title">Analytics <span>Reports</span></h1>
            <div class="header-actions">
                <button class="btn btn-primary" onclick="exportReport()">
                    <i class="fas fa-download"></i> Export PDF
                </button>
            </div>
        </header>

        <div class="content-area">
            <div class="stats-row">
                <div class="mini-stat">
                    <div class="mini-stat-value" id="totalEmp">0</div>
                    <div class="mini-stat-label">Total Employees</div>
                </div>
                <div class="mini-stat">
                    <div class="mini-stat-value" id="avgSal">$0</div>
                    <div class="mini-stat-label">Avg Salary</div>
                </div>
                <div class="mini-stat">
                    <div class="mini-stat-value" id="maxSal">$0</div>
                    <div class="mini-stat-label">Max Salary</div>
                </div>
                <div class="mini-stat">
                    <div class="mini-stat-value" id="minSal">$0</div>
                    <div class="mini-stat-label">Min Salary</div>
                </div>
            </div>

            <div class="reports-grid">
                <div class="report-card">
                    <div class="report-header">
                        <h3 class="report-title">Department Distribution</h3>
                    </div>
                    <div class="chart-container"><canvas id="deptChart"></canvas></div>
                </div>
                <div class="report-card">
                    <div class="report-header">
                        <h3 class="report-title">Designation Levels</h3>
                    </div>
                    <div class="chart-container"><canvas id="desigChart"></canvas></div>
                </div>
                <div class="report-card full-width">
                    <div class="report-header">
                        <h3 class="report-title">Salary Range Analysis</h3>
                    </div>
                    <div class="chart-container"><canvas id="salaryRangeChart"></canvas></div>
                </div>
                <div class="report-card">
                    <div class="report-header">
                        <h3 class="report-title">Monthly Hires</h3>
                    </div>
                    <div class="chart-container"><canvas id="hiresChart"></canvas></div>
                </div>
                <div class="report-card">
                    <div class="report-header">
                        <h3 class="report-title">Department vs Salary</h3>
                    </div>
                    <div class="chart-container"><canvas id="deptSalaryChart"></canvas></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebarToggle');
        sidebarToggle.addEventListener('click', () => sidebar.classList.toggle('collapsed'));

        const username = '[[${username}]]';
        document.getElementById('userName').textContent = username || 'User';
        document.getElementById('userAvatar').textContent = (username || 'U').charAt(0).toUpperCase();

        function showToast(title, message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle' };
            toast.innerHTML = `
                <i class="fas ${icons[type]} toast-icon"></i>
                <div class="toast-content">
                    <div class="toast-title">${title}</div>
                    <div class="toast-message">${message}</div>
                </div>
                <button class="toast-close" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button>
            `;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'toastSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1) reverse forwards';
                setTimeout(() => toast.remove(), 400);
            }, 4000);
        }

        async function loadStats() {
            try {
                const response = await fetch('/api/employees/stats');
                const stats = await response.json();

                document.getElementById('totalEmp').textContent = stats.totalEmployees || 0;
                document.getElementById('avgSal').textContent = '$' + Math.round(stats.averageSalary || 0).toLocaleString();
                document.getElementById('maxSal').textContent = '$' + Math.round(stats.maxSalary || 0).toLocaleString();
                document.getElementById('minSal').textContent = '$' + Math.round(stats.minSalary || 0).toLocaleString();

                initCharts(stats);
            } catch (error) {
                showToast('Error', 'Failed to load reports', 'error');
            }
        }

        function initCharts(stats) {
            const deptLabels = Object.keys(stats.departmentStats || {});
            const deptData = Object.values(stats.departmentStats || {});
            const desigLabels = Object.keys(stats.designationStats || {});
            const desigData = Object.values(stats.designationStats || {});

            // Department Bar Chart
            new Chart(document.getElementById('deptChart'), {
                type: 'bar',
                data: {
                    labels: deptLabels.length ? deptLabels : ['IT', 'HR', 'Finance', 'Marketing'],
                    datasets: [{
                        label: 'Employees',
                        data: deptData.length ? deptData : [25, 15, 12, 8],
                        backgroundColor: ['#00d4ff', '#00ff88', '#ffb347', '#ff6b6b', '#a29bfe', '#fd79a8', '#fdcb6e'],
                        borderRadius: 8,
                        borderSkipped: false
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.05)' } },
                        x: { grid: { display: false } }
                    }
                }
            });

            // Designation Radar Chart
            new Chart(document.getElementById('desigChart'), {
                type: 'radar',
                data: {
                    labels: desigLabels.length ? desigLabels : ['Intern', 'Associate', 'Senior', 'Lead', 'Manager'],
                    datasets: [{
                        label: 'Count',
                        data: desigData.length ? desigData : [5, 20, 15, 8, 5],
                        backgroundColor: 'rgba(0, 212, 255, 0.2)',
                        borderColor: '#00d4ff',
                        pointBackgroundColor: '#00d4ff',
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: '#00d4ff'
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { r: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.05)' } } }
                }
            });

            // Salary Range Horizontal Bar
            new Chart(document.getElementById('salaryRangeChart'), {
                type: 'bar',
                data: {
                    labels: ['< $30K', '$30K-$50K', '$50K-$70K', '$70K-$100K', '$100K+'],
                    datasets: [{
                        label: 'Employees',
                        data: [5, 15, 25, 12, 3],
                        backgroundColor: ['#ff6b6b', '#ffb347', '#00ff88', '#00d4ff', '#a29bfe'],
                        borderRadius: 8,
                        borderSkipped: false
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.05)' } },
                        y: { grid: { display: false } }
                    }
                }
            });

            // Monthly Hires Line
            new Chart(document.getElementById('hiresChart'), {
                type: 'line',
                data: {
                    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                    datasets: [{
                        label: 'New Hires',
                        data: [3, 5, 2, 8, 4, 6],
                        borderColor: '#00ff88',
                        backgroundColor: 'rgba(0, 255, 136, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 5,
                        pointBackgroundColor: '#00ff88',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.05)' } },
                        x: { grid: { display: false } }
                    }
                }
            });

            // Department Salary Bubble
            new Chart(document.getElementById('deptSalaryChart'), {
                type: 'bubble',
                data: {
                    datasets: [
                        { label: 'IT', data: [{x: 25, y: 75000, r: 15}], backgroundColor: '#00d4ff' },
                        { label: 'HR', data: [{x: 15, y: 55000, r: 12}], backgroundColor: '#00ff88' },
                        { label: 'Finance', data: [{x: 12, y: 85000, r: 10}], backgroundColor: '#ffb347' },
                        { label: 'Marketing', data: [{x: 8, y: 60000, r: 8}], backgroundColor: '#ff6b6b' }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { usePointStyle: true, pointStyle: 'circle' } }
                    },
                    scales: {
                        x: { title: { display: true, text: 'Employee Count' }, grid: { color: 'rgba(0,0,0,0.05)' } },
                        y: { title: { display: true, text: 'Avg Salary ($)' }, grid: { color: 'rgba(0,0,0,0.05)' } }
                    }
                }
            });
        }

        function exportReport() {
            showToast('Export', 'Report export feature coming soon!', 'warning');
        }

        loadStats();
        setTimeout(() => showToast('Reports Loaded', 'All analytics data loaded successfully', 'success'), 1000);
    </script>
</body>
</html>
